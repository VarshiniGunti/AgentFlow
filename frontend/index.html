<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentFlow - Neural Orchestrator</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #060e20;
            --surface: #0f1930;
            --surface-low: #091328;
            --surface-high: rgba(25, 37, 64, 0.6);
            --primary: #72dcff;
            --secondary: #dd8bfb;
            --accent: #00d2ff;
            --on-surface: #dee5ff;
            --on-surface-variant: #a3aac4;
            --outline: rgba(114, 220, 255, 0.15);
            --gradient-primary: linear-gradient(135deg, #72dcff, #00d2ff);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--on-surface);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        /* Neural Background Animation */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(114, 220, 255, 0.1), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(221, 139, 251, 0.1), transparent 40%);
            z-index: -1;
            animation: drift 20s infinite alternate ease-in-out;
        }

        @keyframes drift {
            from {
                background-position: 0% 0%;
            }

            to {
                background-position: 10% 10%;
            }
        }

        .container {
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 48px;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            text-align: center;
        }

        h1 {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 56px;
            letter-spacing: -2px;
            color: var(--primary);
            margin-bottom: 12px;
            text-shadow: 0 0 20px rgba(114, 220, 255, 0.3);
        }

        .subtitle {
            font-size: 18px;
            color: var(--on-surface-variant);
            letter-spacing: 0.5px;
        }

        /* Execution Card */
        .execution-card {
            background: var(--surface-high);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--outline);
            position: relative;
            overflow: hidden;
        }

        .execution-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-primary);
            opacity: 0.8;
        }

        /* Input Area */
        .input-wrapper {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-field {
            background: var(--surface-low);
            border: 1px solid var(--outline);
            border-radius: 20px;
            padding: 4px 8px 4px 12px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .input-field:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(114, 220, 255, 0.2);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--on-surface);
            font-size: 18px;
            font-family: 'Inter', sans-serif;
            outline: none;
            padding: 12px 0;
        }

        input::placeholder {
            color: var(--on-surface-variant);
            opacity: 0.5;
        }

        .btn-execute {
            background: var(--gradient-primary);
            color: #004c5e;
            border: none;
            padding: 12px 20px;
            border-radius: 14px;
            font-family: 'Manrope', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .btn-execute:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(114, 220, 255, 0.4);
        }

        .btn-execute:active {
            transform: scale(0.98);
        }

        /* Microphone Button */
        .btn-mic {
            background: transparent;
            border: none;
            color: var(--secondary);
            cursor: pointer;
            padding: 12px;
            margin-right: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .btn-mic:hover {
            color: var(--primary);
            transform: scale(1.1);
        }

        .btn-mic.listening {
            color: #ff3b3b;
            animation: pulse-mic 1.5s infinite;
        }

        @keyframes pulse-mic {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(221, 139, 251, 0.4);
            }

            70% {
                transform: scale(1.1);
                box-shadow: 0 0 0 10px rgba(221, 139, 251, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(221, 139, 251, 0);
            }
        }

        /* Success Pulse bloom effect */
        .success-pulse {
            animation: pulse-bloom 2s ease-out;
        }

        @keyframes pulse-bloom {
            0% {
                box-shadow: 0 0 0 0 rgba(114, 220, 255, 0.4);
            }

            50% {
                box-shadow: 0 0 40px 10px rgba(114, 220, 255, 0.6);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(114, 220, 255, 0);
            }
        }

        /* Neural Atlas (Mind Map) */
        .neural-atlas {
            margin: 40px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .atlas-container {
            position: relative;
            width: 100%;
            height: 300px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            border: 1px solid var(--outline);
            margin-top: 24px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .atlas-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .atlas-node {
            position: absolute;
            width: 80px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--surface-low);
            border: 1px solid var(--outline);
            border-radius: 50%;
            font-size: 10px;
            font-weight: 800;
            color: var(--on-surface-variant);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5;
            cursor: default;
            user-select: none;
        }

        .atlas-node .icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .atlas-node.active {
            border-color: var(--primary);
            color: var(--on-surface);
            background: rgba(114, 220, 255, 0.1);
            box-shadow: 0 0 30px rgba(114, 220, 255, 0.4);
            transform: scale(1.1);
        }

        .atlas-node.thinking {
            animation: node-thinking 1.5s infinite alternate;
        }

        @keyframes node-thinking {
            from {
                border-color: var(--outline);
                box-shadow: none;
            }

            to {
                border-color: var(--primary);
                box-shadow: 0 0 20px var(--primary);
            }
        }

        .atlas-path {
            fill: none;
            stroke: var(--outline);
            stroke-width: 2;
            stroke-dasharray: 6;
            opacity: 0.2;
            transition: all 0.5s ease;
        }

        .atlas-path.active {
            stroke: var(--primary);
            stroke-width: 3;
            stroke-dasharray: none;
            opacity: 0.8;
            filter: drop-shadow(0 0 5px var(--primary));
        }

        .data-packet {
            fill: var(--primary);
            filter: drop-shadow(0 0 5px var(--primary));
            display: none;
        }

        .data-packet.animating {
            display: block;
        }

        .results-section {
            display: none;
            flex-direction: column;
            gap: 40px;
            margin-top: 40px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h3 {
            font-family: 'Manrope', sans-serif;
            font-size: 20px;
            color: var(--secondary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #rationale {
            font-size: 17px;
            line-height: 1.6;
            color: var(--on-surface);
            opacity: 0.9;
            padding-left: 20px;
            border-left: 2px solid var(--secondary);
        }

        /* Trace Flow */
        .trace-flow {
            position: relative;
            padding-left: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .trace-flow::before {
            content: '';
            position: absolute;
            left: 11px;
            top: 10px;
            bottom: 10px;
            width: 2px;
            background: linear-gradient(to bottom, var(--primary), var(--secondary));
            opacity: 0.3;
        }

        .trace-node {
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
        }

        .trace-node::before {
            content: '';
            position: absolute;
            left: -33px;
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
        }

        .node-tag {
            background: var(--surface-low);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            color: var(--primary);
            border: 1px solid var(--outline);
        }

        /* JSON Output */
        .json-output {
            background: #000;
            padding: 32px;
            border-radius: 24px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            color: #2ecc71;
            overflow-x: auto;
            border: 1px solid rgba(46, 204, 113, 0.1);
            line-height: 1.5;
        }

        /* Loading Animation */
        .loader {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin: 40px 0;
            color: var(--primary);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out;
            box-shadow: 0 0 10px var(--primary);
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* Neural Reflection Feed */
        .reflection-container {
            margin-top: 32px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(114, 220, 255, 0.1);
            border-radius: 16px;
            padding: 16px;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            color: #00d2ff;
            opacity: 0.6;
            max-height: 120px;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            gap: 4px;
        }

        .reflection-line {
            display: flex;
            gap: 8px;
        }

        .reflection-timestamp {
            opacity: 0.4;
            min-width: 70px;
        }

        .reflection-msg {
            word-break: break-all;
        }

        @keyframes pulse {

            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.3;
            }

            40% {
                transform: scale(1.2);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>AgentFlow</h1>
            <p class="subtitle">NEURAL ORCHESTRATION LAYER</p>
        </header>

        <main class="execution-card">
            <div class="input-wrapper">
                <div class="input-field">
                    <button id="mic-btn" class="btn-mic" onclick="toggleSpeech()" title="Voice Input">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor"
                                d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
                            <path fill="currentColor"
                                d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
                        </svg>
                    </button>
                    <input type="text" id="prompt" placeholder="Command your agent swarm..." autocomplete="off">
                    <button class="btn-execute" onclick="execute()">INITIATE</button>
                </div>
            </div>

            <div id="loader" class="loader">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <span>SYNCING NEURAL PATHWAYS</span>
            </div>

            <div class="neural-atlas">
                <h3>Neural Swarm Atlas</h3>
                <div id="atlas" class="atlas-container">
                    <svg class="atlas-svg" viewBox="0 0 800 300">
                        <!-- Paths -->
                        <path id="path-task" class="atlas-path" d="M 400 60 L 100 240" />
                        <path id="path-calendar" class="atlas-path" d="M 400 60 L 300 240" />
                        <path id="path-notes" class="atlas-path" d="M 400 60 L 500 240" />
                        <path id="path-research" class="atlas-path" d="M 400 60 L 700 240" />

                        <!-- Data Packets -->
                        <circle id="pkt-task" class="data-packet" r="4">
                            <animateMotion id="anim-task" dur="1s" repeatCount="indefinite" begin="indefinite">
                                <mpath href="#path-task" />
                            </animateMotion>
                        </circle>
                        <circle id="pkt-calendar" class="data-packet" r="4">
                            <animateMotion id="anim-calendar" dur="1s" repeatCount="indefinite" begin="indefinite">
                                <mpath href="#path-calendar" />
                            </animateMotion>
                        </circle>
                        <circle id="pkt-notes" class="data-packet" r="4">
                            <animateMotion id="anim-notes" dur="1s" repeatCount="indefinite" begin="indefinite">
                                <mpath href="#path-notes" />
                            </animateMotion>
                        </circle>
                        <circle id="pkt-research" class="data-packet" r="4">
                            <animateMotion id="anim-research" dur="1s" repeatCount="indefinite" begin="indefinite">
                                <mpath href="#path-research" />
                            </animateMotion>
                        </circle>
                    </svg>

                    <!-- Nodes -->
                    <div id="node-planner" class="atlas-node" style="top: 20px; left: calc(50% - 40px);">
                        <span class="icon">🧠</span>
                        <span>PLANNER</span>
                    </div>
                    <div id="node-task" class="atlas-node" style="top: 200px; left: calc(12.5% - 40px);">
                        <span class="icon">🕒</span>
                        <span>TASK</span>
                    </div>
                    <div id="node-calendar" class="atlas-node" style="top: 200px; left: calc(37.5% - 40px);">
                        <span class="icon">📅</span>
                        <span>CALENDAR</span>
                    </div>
                    <div id="node-notes" class="atlas-node" style="top: 200px; left: calc(62.5% - 40px);">
                        <span class="icon">📝</span>
                        <span>NOTES</span>
                    </div>
                    <div id="node-research" class="atlas-node" style="top: 200px; left: calc(87.5% - 40px);">
                        <span class="icon">🔍</span>
                        <span>RESEARCH</span>
                    </div>
                </div>
            </div>

            <div id="results-section" class="results-section">
                <section>
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <h3 style="margin: 0;">Rationalization</h3>
                        <button id="speak-btn" class="btn-mic" onclick="readRationale()" title="Read Aloud"
                            style="margin: 0; padding: 4px; display: none;">
                            <svg viewBox="0 0 24 24" width="20" height="20">
                                <path fill="currentColor"
                                    d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                            </svg>
                        </button>
                    </div>
                    <p id="rationale"></p>
                </section>

                <section>
                    <h3>Execution Chain</h3>
                    <div id="trace" class="trace-flow"></div>
                </section>

                <section>
                    <h3>Output Payload</h3>
                    <pre id="results" class="json-output"></pre>
                </section>
                <section id="reflection-section" class="reflection-container">
                    <!-- Reflection logs appear here -->
                </section>
            </div>
        </main>
    </div>

    <script>
        let recognition;
        let isListening = false;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('prompt').value = transcript;
                stopListeningUI();
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                stopListeningUI();
            };

            recognition.onend = () => {
                stopListeningUI();
            };
        }

        function toggleSpeech() {
            if (!recognition) {
                alert("Speech recognition not supported in this browser.");
                return;
            }

            if (isListening) {
                recognition.stop();
            } else {
                startListeningUI();
                recognition.start();
            }
        }

        function startListeningUI() {
            isListening = true;
            const btn = document.getElementById('mic-btn');
            btn.classList.add('listening');
            document.getElementById('prompt').placeholder = "Listening...";
        }

        function stopListeningUI() {
            isListening = false;
            const btn = document.getElementById('mic-btn');
            btn.classList.remove('listening');
            document.getElementById('prompt').placeholder = "Command your agent swarm...";
        }

        let lastRationale = "";

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.pitch = 1.0;
                utterance.rate = 1.0;
                const voices = window.speechSynthesis.getVoices();
                const usVoice = voices.find(v => v.lang === 'en-US' && (v.name.includes('Google') || v.name.includes('Neural')));
                if (usVoice) utterance.voice = usVoice;
                window.speechSynthesis.speak(utterance);
            }
        }

        function readRationale() {
            if (lastRationale) speak(lastRationale);
        }

        function typeWriter(text, elementId, speed = 20) {
            let i = 0;
            const elem = document.getElementById(elementId);
            elem.textContent = "";
            function type() {
                if (i < text.length) {
                    elem.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        function startSearchAnimation() {
            const planner = document.getElementById('node-planner');
            if (planner) planner.classList.add('thinking');
            document.querySelectorAll('.data-packet').forEach(pkt => {
                pkt.classList.add('animating');
                const animId = pkt.id.replace('pkt-', 'anim-');
                const anim = document.getElementById(animId);
                if (anim) anim.beginElement();
            });
        }

        function stopSearchAnimation() {
            const planner = document.getElementById('node-planner');
            if (planner) planner.classList.remove('thinking');
            document.querySelectorAll('.data-packet').forEach(pkt => {
                pkt.classList.remove('animating');
                const animId = pkt.id.replace('pkt-', 'anim-');
                const anim = document.getElementById(animId);
                if (anim) anim.endElement();
            });
        }

        function updateAtlas(workflow) {
            stopSearchAnimation();
            document.querySelectorAll('.atlas-node, .atlas-path').forEach(el => el.classList.remove('active'));
            const nodeMap = {
                'planner': 'node-planner',
                'task': 'node-task',
                'calendar': 'node-calendar',
                'notes': 'node-notes',
                'research': 'node-research'
            };

            if (workflow && workflow.length > 0) {
                workflow.forEach(step => {
                    const agent = step.split('.')[0];
                    const node = document.getElementById(nodeMap[agent]);
                    const path = document.getElementById(`path-${agent}`);
                    const pkt = document.getElementById(`pkt-${agent}`);
                    const anim = document.getElementById(`anim-${agent}`);
                    if (node) node.classList.add('active');
                    if (path) path.classList.add('active');
                    if (pkt && anim) {
                        pkt.classList.add('animating');
                        anim.beginElement();
                    }
                });
            }
            const planner = document.getElementById('node-planner');
            if (planner) planner.classList.add('active');
        }

        function triggerSuccessPulse() {
            const card = document.querySelector('.execution-card');
            card.classList.add('success-pulse');
            setTimeout(() => card.classList.remove('success-pulse'), 2000);
        }

        function addReflection(msg) {
            const container = document.getElementById('reflection-section');
            container.style.display = 'flex';
            const line = document.createElement('div');
            line.className = 'reflection-line';
            const ts = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 2 });
            line.innerHTML = `<span class="reflection-timestamp">[${ts}]</span><span class="reflection-msg">${msg.toUpperCase()}</span>`;
            container.appendChild(line);
            container.scrollTop = container.scrollHeight;
        }

        async function execute() {
            const promptInput = document.getElementById('prompt');
            const prompt = promptInput.value;
            if (!prompt) return;

            window.speechSynthesis.cancel();
            const loader = document.getElementById('loader');
            const resultsSection = document.getElementById('results-section');
            const rationaleElem = document.getElementById('rationale');
            const resultsElem = document.getElementById('results');
            const speakBtn = document.getElementById('speak-btn');
            const reflectionSection = document.getElementById('reflection-section');

            loader.style.display = 'flex';
            resultsSection.style.display = 'none';
            speakBtn.style.display = 'none';
            reflectionSection.innerHTML = '';
            reflectionSection.style.display = 'none';

            addReflection("Initializing Neural Link...");
            startSearchAnimation();
            addReflection("Synchronizing with Agent Swarm...");

            try {
                addReflection("Deploying Planner: Contextualizing Request...");
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                addReflection("Swarm Response Received. Decoding Payload...");
                const data = await response.json();
                loader.style.display = 'none';
                resultsSection.style.display = 'flex';

                lastRationale = data.plan_rationale || "";
                typeWriter(lastRationale || "Plan executed successfully.", 'rationale');
                resultsElem.textContent = JSON.stringify(data.results, null, 2);

                if (lastRationale) speakBtn.style.display = 'flex';
                triggerSuccessPulse();
                updateAtlas(data.workflow || []);

                const traceContainer = document.getElementById('trace');
                traceContainer.innerHTML = '';
                if (data.workflow && data.workflow.length > 0) {
                    data.workflow.forEach((step) => {
                        addReflection(`Executing ${step}...`);
                        const node = document.createElement('div');
                        node.className = 'trace-node';
                        const label = step.split('.').pop().replace('_', ' ');
                        const agent = step.split('.')[0];
                        const iconMap = { 'planner': '🧠', 'task': '🕒', 'calendar': '📅', 'notes': '📝', 'research': '🔍' };
                        node.innerHTML = `
                            <span class="node-tag" style="border-left: 4px solid var(--${agent === 'planner' ? 'primary' : 'secondary'})">
                                <small style="display:block; font-size: 10px; opacity: 0.6; margin-bottom: 2px;">${iconMap[agent] || '🤖'} ${agent.toUpperCase()}</small>
                                ${label.toUpperCase()}
                            </span>
                        `;
                        traceContainer.appendChild(node);
                    });
                    addReflection("Neural Flow Complete. Integrity Verified.");
                } else {
                    traceContainer.innerHTML = '<p style="opacity: 0.4;">Silent execution.</p>';
                    addReflection("Swarm state: Quiescent.");
                }
            } catch (err) {
                addReflection(`CRITICAL FAILURE: ${err.message}`);
                alert('Connection Terminated: ' + err.message);
            } finally {
                loader.style.display = 'none';
            }
        }

        document.getElementById('prompt').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') execute();
        });
    </script>
</body>

</html>
